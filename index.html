  <style>
    :root {

    @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-33.33%); } }
    @keyframes insuranceScroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.4); } }
    @keyframes heroZoom { 0% { transform: scale(1) translateX(0); } 100% { transform: scale(1.12) translateX(-1.5%); } }
    @keyframes scrollCue { 0% { transform: translateY(-100%); } 100% { transform: translateY(400%); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes lightboxIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes lightboxImg { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
    @keyframes articleIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes chatIn { from { opacity: 0; transform: translateY(16px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes typing { 0%, 60%, 100% { opacity: 0.3; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-3px); } }
